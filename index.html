<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ кровати</title>
<style>
  :root { --bg: #F7F5F2; --surface: #FFFFFF; --border: #E2DDD8; --text: #1A1814; --muted: #7A7570; --accent: #2C2420; --tag-bg: #EDE9E4; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); min-height: 100vh; }
  header { background: var(--accent); color: #fff; padding: 2rem 1.5rem; text-align: center; }
  header h1 { font-size: 1.8rem; margin-bottom: .5rem; }
  .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; letter-spacing: 0.05em; }
  
  /* Кнопки материалов */
  .mat-list { display: flex; flex-direction: column; gap: 10px; }
  .mat-btn { 
    padding: 15px; border: 2px solid var(--border); border-radius: 10px; 
    background: #fff; text-align: left; cursor: pointer; transition: 0.2s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .mat-btn.active { border-color: var(--accent); background: var(--tag-bg); }
  .mat-name { font-weight: 600; font-size: 1rem; }
  .mat-price { font-size: 0.9rem; color: var(--muted); }
  .mat-btn.active .mat-price { color: var(--accent); font-weight: bold; }

  /* Сетка фото (строго 3 в ряд) */
  .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
  
  .color-item { 
    aspect-ratio: 1; border-radius: 8px; overflow: hidden; 
    border: 3px solid transparent; cursor: pointer; position: relative;
    background: #eee;
  }
  .color-item.active { border-color: var(--accent); transform: scale(0.95); }
  .color-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .color-item.active .color-img { opacity: 0.8; }

  .color-name { text-align: center; margin-top: 10px; font-weight: 600; color: var(--accent); min-height: 1.2em;}

  /* Полный список номеров цветов */
  .color-list { 
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; 
    padding-top: 15px; border-top: 1px solid var(--border);
  }
  .color-list-item {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    background: #fff; white-space: nowrap;
  }
  .color-list-item:hover { background: var(--tag-bg); }
  .color-list-item.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 5px; }
  input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg); }
  
  .summary { background: var(--tag-bg); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
  .sum-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
  .sum-row:last-child { margin-bottom: 0; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; }
  
  .btn-submit { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
  .btn-submit:disabled { opacity: 0.6; }
  
  .success { display: none; text-align: center; padding: 3rem 1rem; }

  /* Зум фото */
  .zoom-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 1000; align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .zoom-modal img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>🛏 Конструктор кровати</h1>
  <p>Соберите идеальную кровать под себя</p>
</header>

<div class="container" id="app">
  
  <!-- 1. Материал -->
  <div class="card">
    <div class="card-title">1. Выберите материал</div>
    <div class="mat-list" id="mat-list"></div>
  </div>

  <!-- 2. Цвет -->
  <div class="card">
    <div class="card-title">2. Выберите цвет обивки</div>
    <div class="color-grid" id="color-grid"></div>
    <div class="color-name" id="selected-color-name">Выберите цвет</div>
    <div class="color-list" id="color-list"></div>
  </div>

  <!-- 3. Размер -->
  <div class="card">
    <div class="card-title">3. Размер спального места</div>
    <div class="field">
      <select id="size-select" onchange="updateSummary()">
        <option value="80x200">80 x 200 см</option>
        <option value="90x200">90 x 200 см</option>
        <option value="120x200">120 x 200 см</option>
        <option value="140x200" selected>140 x 200 см</option>
        <option value="160x200">160 x 200 см</option>
        <option value="180x200">180 x 200 см</option>
      </select>
    </div>
  </div>

  <!-- 4. Контакты -->
  <div class="card">
    <div class="card-title">4. Ваши данные</div>
    <div class="field"><input type="text" id="f-name" placeholder="Ваше имя"></div>
    <div class="field"><input type="tel" id="f-phone" placeholder="+7 (999) 000-00-00"></div>
    <div class="field"><textarea id="f-comment" rows="3" placeholder="Комментарий (адрес, этаж)"></textarea></div>
  </div>

  <!-- Итог -->
  <div class="summary">
    <div class="sum-row"><span>Материал:</span> <span id="sum-mat">-</span></div>
    <div class="sum-row"><span>Цвет:</span> <span id="sum-color">-</span></div>
    <div class="sum-row"><span>Размер:</span> <span id="sum-size">140x200</span></div>
    <div class="sum-row"><span>Доплата за ткань:</span> <span id="sum-price">0 ₽</span></div>
  </div>

  <button class="btn-submit" onclick="sendOrder()" id="btn-send">Отправить заказ</button>
</div>

<div class="container success" id="success-screen">
  <h1 style="font-size: 3rem;">✅</h1>
  <h2>Заказ принят!</h2>
  <p style="margin: 1rem 0; color: #666;">Мы свяжемся с вами в ближайшее время.</p>
  <button class="btn-submit" onclick="location.reload()" style="background: transparent; border: 2px solid var(--accent); color: var(--accent);">Новый заказ</button>
</div>

<!-- Модальное окно для зума -->
<div class="zoom-modal" id="zoom-modal" onclick="closeZoom()">
  <img src="" alt="Zoom" id="zoom-img">
</div>

<script>
// ==========================================
// НАСТРОЙКИ TELEGRAM

const BOT_TOKEN = '8879313422:AAETp06ReVN5wGaN610cossDKckQm5818tI';
const CHAT_ID = '5210823670';

// ==========================================
// ССЫЛКИ НА ФОТО

// Фото для Антивандального (Relax)

const RELAX_2 = BASE_URL + 'photo_2026-06-14%2013.30.12.jpeg';

// Фото для Стандартного велюра
const VELVET_1 = BASE_URL + 'photo_2026-06-14%2013.30.07.jpeg';
const VELVET_2 = BASE_URL + 'photo_2026-06-14%2013.30.06.jpeg';

// Фото для Букле (Teddy)
const BOUCLE_1 = BASE_URL + 'photo_2026-06-14%2013.30.18.jpeg';
const BOUCLE_2 = BASE_URL + 'photo_2026-06-14%2013.30.20.jpeg';

// Структура данных с ПОЛНЫМИ списками
const DATA = {
  // 1. АНТИВАНДАЛЬНЫЙ (RELAX)
  relax: {
    id: 'relax',
    name: 'Антивандальный (Relax)',
    price: 1000,
    colors: [
      { num: '30', name: 'Relax 30', img: RELAX_1 },
      { num: '20', name: 'Relax 20', img: RELAX_1 },
      { num: '35', name: 'Relax 35', img: RELAX_2 },
      { num: '40', name: 'Relax 40', img: RELAX_2 },
      { num: '50', name: 'Relax 50', img: RELAX_3 },
      { num: '70', name: 'Relax 70', img: RELAX_3 },
      { num: '75', name: 'Relax 75', img: RELAX_1 },
      { num: '190', name: 'Relax 190', img: RELAX_2 },
      { num: '180', name: 'Relax 180', img: RELAX_3 },
      { num: '170', name: 'Relax 170', img: RELAX_1 },
      { num: '140', name: 'Relax 140', img: RELAX_2 },
      { num: '089', name: 'Relax 089', img: RELAX_3 },
      { num: '145', name: 'Relax 145', img: RELAX_1 },
      { num: '60', name: 'Relax 60', img: RELAX_2 },
      { num: '61', name: 'Relax 61', img: RELAX_3 },
      { num: '65', name: 'Relax 65', img: RELAX_1 },
      { num: '63', name: 'Relax 63', img: RELAX_2 }
    ]
  },
  
  // 2. СТАНДАРТНЫЙ ВЕЛЮР (Belisimmo + Boston)
  velvet: {
    id: 'velvet',
    name: 'Стандартный велюр',
    price: 0,
    // Объединяем два списка в один массив, добавляя префиксы для ясности
    colors: [
      // Belisimmo
      { num: 'B-1', name: 'Belisimmo 1', img: VELVET_1 },
      { num: 'B-3', name: 'Belisimmo 3', img: VELVET_1 },
      { num: 'B-4', name: 'Belisimmo 4', img: VELVET_2 },
      { num: 'B-5', name: 'Belisimmo 5', img: VELVET_2 },
      { num: 'B-7', name: 'Belisimmo 7', img: VELVET_3 },
      { num: 'B-9', name: 'Belisimmo 9', img: VELVET_3 },
      { num: 'B-10', name: 'Belisimmo 10', img: VELVET_1 },
      { num: 'B-11', name: 'Belisimmo 11', img: VELVET_1 },
      { num: 'B-12', name: 'Belisimmo 12', img: VELVET_2 },
      { num: 'B-13', name: 'Belisimmo 13', img: VELVET_2 },
      { num: 'B-14', name: 'Belisimmo 14', img: VELVET_3 },
      { num: 'B-15', name: 'Belisimmo 15', img: VELVET_3 },
      { num: 'B-16', name: 'Belisimmo 16', img: VELVET_1 },
      { num: 'B-18', name: 'Belisimmo 18', img: VELVET_1 },
      { num: 'B-20', name: 'Belisimmo 20', img: VELVET_2 },
      { num: 'B-21', name: 'Belisimmo 21', img: VELVET_2 },
      { num: 'B-22', name: 'Belisimmo 22', img: VELVET_3 },
      { num: 'B-23', name: 'Belisimmo 23', img: VELVET_3 },
      { num: 'B-25', name: 'Belisimmo 25', img: VELVET_1 },
      { num: 'B-26', name: 'Belisimmo 26', img: VELVET_1 },
      { num: 'B-27', name: 'Belisimmo 27', img: VELVET_2 },
      { num: 'B-28', name: 'Belisimmo 28', img: VELVET_2 },
      { num: 'B-35', name: 'Belisimmo 35', img: VELVET_3 },
      // Boston
      { num: 'Bo-1', name: 'Boston 1', img: VELVET_1 },
      { num: 'Bo-2', name: 'Boston 2', img: VELVET_1 },
      { num: 'Bo-3', name: 'Boston 3', img: VELVET_2 },
      { num: 'Bo-4', name: 'Boston 4', img: VELVET_2 },
      { num: 'Bo-5', name: 'Boston 5', img: VELVET_3 },
      { num: 'Bo-6', name: 'Boston 6', img: VELVET_3 },
      { num: 'Bo-7', name: 'Boston 7', img: VELVET_1 },
      { num: 'Bo-8', name: 'Boston 8', img: VELVET_1 },
      { num: 'Bo-9', name: 'Boston 9', img: VELVET_2 },
      { num: 'Bo-10', name: 'Boston 10', img: VELVET_2 },
      { num: 'Bo-14', name: 'Boston 14', img: VELVET_3 },
      { num: 'Bo-15', name: 'Boston 15', img: VELVET_3 },
      { num: 'Bo-16', name: 'Boston 16', img: VELVET_1 },
      { num: 'Bo-17', name: 'Boston 17', img: VELVET_1 },
      { num: 'Bo-18', name: 'Boston 18', img: VELVET_2 },
      { num: 'Bo-19', name: 'Boston 19', img: VELVET_2 },
      { num: 'Bo-20', name: 'Boston 20', img: VELVET_3 },
      { num: 'Bo-21', name: 'Boston 21', img: VELVET_3 }
    ]
  },

  // 3. БУКЛЕ (TEDDY)
  boucle: {
    id: 'boucle',
    name: 'Букле (Teddy)',
    price: 2000,
    colors: [
      { num: '1', name: 'White', img: BOUCLE_1 },
      { num: '2', name: 'Beige', img: BOUCLE_1 },
      { num: '3', name: 'Brown', img: BOUCLE_2 },
      { num: '4', name: 'Rust', img: BOUCLE_2 },
      { num: '5', name: 'Rose', img: BOUCLE_1 },
      { num: '6', name: 'Silver', img: BOUCLE_1 },
      { num: '7', name: 'Storm', img: BOUCLE_2 },
      { num: '8', name: 'Grey', img: BOUCLE_2 }
    ]
  }
};

let state = { mat: 'relax', colorName: '', size: '140x200' };

function init() {
  renderMaterials();
  selectMaterial('relax');
}

function renderMaterials() {
  const container = document.getElementById('mat-list');
  container.innerHTML = '';
  Object.values(DATA).forEach(mat => {
    const btn = document.createElement('div');
    btn.className = 'mat-btn';
    btn.id = `btn-${mat.id}`;
    btn.onclick = () => selectMaterial(mat.id);
    btn.innerHTML = `<span class="mat-name">${mat.name}</span><span class="mat-price">${mat.price > 0 ? '+' + mat.price + ' ₽' : 'Бесплатно'}</span>`;
    container.appendChild(btn);
  });
}

function selectMaterial(id) {
  state.mat = id;
  document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${id}`).classList.add('active');
  
  const matData = DATA[id];
  document.getElementById('sum-mat').textContent = matData.name;
  document.getElementById('sum-price').textContent = matData.price > 0 ? `+${matData.price} ₽` : '0 ₽';
  
  renderColors(matData.colors);
}

function renderColors(colors) {
  const grid = document.getElementById('color-grid');
  const list = document.getElementById('color-list');
  grid.innerHTML = '';
  list.innerHTML = '';
  
  // Выбираем первый цвет по умолчанию
  selectColor(`${colors[0].num} - ${colors[0].name}`);
  
  // Рендерим сетку фото (показываем только первые 3 уникальных фото или заглушки)
  // Чтобы не ломать верстку, если цветов 50+, показываем только превью первых 3-х
  const previewColors = colors.slice(0, 3); 
  
  previewColors.forEach((c, index) => {
    const item = document.createElement('div');
    item.className = 'color-item' + (index === 0 ? ' active' : '');
    item.innerHTML = `<img src="${c.img}" class="color-img" alt="${c.num}" loading="lazy">`;
    
    item.onclick = () => {
      document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      // При клике на фото выбираем соответствующий цвет из полного списка
      // Но так как фото повторяются, просто выберем первый попавшийся с таким же фото
      const matchingColor = colors.find(col => col.img === c.img);
      if(matchingColor) selectColor(`${matchingColor.num} - ${matchingColor.name}`);
    };
    grid.appendChild(item);
  });
  
  // Рендерим ПОЛНЫЙ список номеров снизу
  colors.forEach((c, index) => {
    const listItem = document.createElement('div');
    listItem.className = 'color-list-item' + (index === 0 ? ' active' : '');
    // Для велюра показываем короткий номер (без B- или Bo-), но в логику передаем полный
    const displayNum = c.num.replace('B-', '').replace('Bo-', '');
    listItem.textContent = displayNum;
    
    listItem.onclick = () => {
      document.querySelectorAll('.color-list-item').forEach(el => el.classList.remove('active'));
      listItem.classList.add('active');
      
      // Снимаем выделение с фото, так как выбран конкретный номер из списка
      document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
      
      selectColor(`${c.num} - ${c.name}`);
    };
    list.appendChild(listItem);
  });
}

function selectColor(name) {
  state.colorName = name;
  document.getElementById('selected-color-name').textContent = name;
  document.getElementById('sum-color').textContent = name;
}

function updateSummary() {
  state.size = document.getElementById('size-select').value;
  document.getElementById('sum-size').textContent = state.size;
}

// Зум фото
function openZoom(imgSrc) {
  const modal = document.getElementById('zoom-modal');
  const img = document.getElementById('zoom-img');
  img.src = imgSrc;
  modal.style.display = 'flex';
}

function closeZoom() {
  document.getElementById('zoom-modal').style.display = 'none';
}

async function sendOrder() {
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  if(!name || !phone) { alert('Заполните Имя и Телефон'); return; }
  
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = 'Отправка...';
  
  const matData = DATA[state.mat];
  const comment = document.getElementById('f-comment').value;
  
  const text = `🛏 *НОВЫЙ ЗАКАЗ*\n *Имя:* ${name}\n *Телефон:* ${phone}\n\n *Параметры:*\n• Материал: ${matData.name}\n• Цвет: ${state.colorName}\n• Размер: ${state.size}\n• Доплата: ${matData.price} руб.\n\n💬 *Коммент:* ${comment || 'Нет'}`;
  
  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
    });
    document.getElementById('app').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  } catch(e) {
    alert('Ошибка отправки.');
    btn.disabled = false; btn.textContent = 'Отправить заказ';
  }
}

init();
</script>
</body>
</html>
